# =============================================================================
# PROMETA ONE — Tam Stack Docker Compose
# PostgreSQL + API (api-server, Hono/tsx) + Frontend (Vite) + ML (FastAPI) + Adminer
#
# Kullanım:
#   docker compose up -d --build
#   docker compose exec api npm run migrate   # ilk açılışta (idempotent)
#   docker compose exec api npm run seed       # opsiyonel, ilk kurulumda
#
# Erişim:
#   Frontend:    http://localhost:5173
#   Backend API: http://localhost:3000/v1
#   ML Service:  http://localhost:8001
#   Adminer:     http://localhost:8080 (tools profili)
#
# NOT: Gerçek backend api-server/ (Clean Architecture, TS). Eski legacy backend/
# artık deploy edilmiyor (Strangler Fig — silinmeye aday).
# =============================================================================

services:
  # === PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    container_name: prometa-one-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prometa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prometa123}
      POSTGRES_DB: ${POSTGRES_DB:-prometa_one}
      TZ: Europe/Istanbul
      PGTZ: Europe/Istanbul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prometa} -d ${POSTGRES_DB:-prometa_one}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prometa

  # === Backend API (api-server — Hono + tsx) ===
  api:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: prometa-one-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:-prometa}:${POSTGRES_PASSWORD:-prometa123}@postgres:5432/${POSTGRES_DB:-prometa_one}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-string-min-32-chars-please}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-another-long-random-string-also-min-32-chars-please}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      APP_URL: ${APP_URL:-http://localhost:5173}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      TCMB_API_KEY: ${TCMB_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EINVOICE_MASTER_KEY: ${EINVOICE_MASTER_KEY:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-M Suite <noreply@prometahr.com>}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      ENABLE_CRON: ${ENABLE_CRON:-true}
      PROMETA_FINGERPRINT: ${PROMETA_FINGERPRINT:-}
      ML_SERVICE_URL: http://ml-service:8001
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: api-server
      TZ: Europe/Istanbul
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - prometa

  # === Frontend (React + Vite) ===
  frontend:
    image: node:20-alpine
    container_name: prometa-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_ML_URL: http://localhost:8001
      TZ: Europe/Istanbul
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - prometa
    depends_on:
      - api

  # === ML Service (Python + FastAPI + scikit-learn) ===
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: prometa-ml
    restart: unless-stopped
    environment:
      MODEL_DIR: /app/models_data
      TZ: Europe/Istanbul
    ports:
      - "8001:8001"
    volumes:
      - ./ml-service:/app
      - ml_models:/app/models_data
    networks:
      - prometa

  # === Adminer (PostgreSQL UI — opsiyonel, 'tools' profili ile etkin) ===
  adminer:
    image: adminer:4-standalone
    container_name: prometa-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
      TZ: Europe/Istanbul
    ports:
      - "8080:8080"
    networks:
      - prometa
    depends_on:
      - postgres
    profiles:
      - tools

  # === Construction Service — Şantiye Yönetim Mikroservisi (bağımsız) ===
  # Kendi DB'si (construction-db) + Kafka event publisher. Monolite çalışma
  # zamanı bağımlılığı yok; JWT_SECRET monolit ile paylaşılır (stateless auth).
  construction-db:
    image: postgres:16-alpine
    container_name: prometa-construction-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prometa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prometa123}
      POSTGRES_DB: prometa_construction
      TZ: Europe/Istanbul
      PGTZ: Europe/Istanbul
    ports:
      - "5433:5432"
    volumes:
      - construction_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prometa} -d prometa_construction"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prometa

  kafka:
    image: bitnami/kafka:3.7
    container_name: prometa-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      TZ: Europe/Istanbul
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - prometa

  construction-service:
    build:
      context: ./construction-service
      dockerfile: Dockerfile
    container_name: prometa-construction
    restart: unless-stopped
    # JWT_SECRET + CORS vb. servisin kendi .env'inden gelir (monolit ile AYNI secret —
    # token doğrulaması için şart). environment yalnızca container-içi ağ/port override'ı yapar.
    env_file:
      - ./construction-service/.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3002
      HOST: 0.0.0.0
      # Veri mevcut ana Postgres örneğindeki prometa_construction DB'sinde (ayrı construction-db değil).
      DATABASE_URL: postgres://${POSTGRES_USER:-prometa}:${POSTGRES_PASSWORD:-prometa123}@postgres:5432/prometa_construction
      # KAFKA_BROKERS bilinçli olarak set edilmedi → event publisher no-op (mevcut davranışla aynı).
      TZ: Europe/Istanbul
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prometa

networks:
  prometa:
    driver: bridge

volumes:
  frontend_node_modules:
  ml_models:
  postgres_data:
  construction_db_data:
  kafka_data:
