name: Deploy (self-hosted Â· local Docker)

# Otomatik deploy: master/main'e push olunca PC'ndeki self-hosted runner
# build + test yapar, ardÄ±ndan docker-compose ile servisleri ayaÄźa kaldÄ±rÄ±r.
# Manuel tetikleme iĂ§in Actions sekmesinden "Run workflow" da kullanÄ±labilir.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-local
  cancel-in-progress: true

jobs:
  build-test-deploy:
    name: Build Â· Test Â· Deploy
    runs-on: [self-hosted]

    # Bu makinede `shell: bash`, PATH'te System32'deki WSL launcher'ina
    # (C:\Windows\System32\bash.exe) cozuluyordu â€” WSL icinde Windows'a kurulu
    # node/npm YOK, dolayisiyla "Install dependencies" (npm ci) ~2 sn'de exit 1
    # ile patliyordu. Cozum: kabugu ACIK sekilde Git Bash'e sabitle (node/npm
    # Windows PATH'ini miras alir). Yol bu self-hosted makinede sabit.
    # NOT: Runner custom-shell dizesini bosluktan bolup ilk parcayi exe sayar ve
    # tirnakli yolu ONURLANDIRMAZ ("C:\Program... hatasi verir). Bu yuzden bosluksuz
    # 8.3 kisa yol kullaniyoruz (C:\PROGRA~1 = C:\Program Files).
    defaults:
      run:
        shell: 'C:\PROGRA~1\Git\bin\bash.exe --noprofile --norc -eo pipefail "{0}"'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      # api-server testleri .env ister (config zod parse); dosya artik repo'da GIZLI â€”
      # deploy adimindaki kuralin aynisi: makinedeki kanonik kopyadan alinir.
      - name: Env hazirla (.env makine kopyasindan)
        run: |
          if [ ! -f api-server/.env ] && [ -f /c/prometa-one/api-server/.env ]; then
            cp /c/prometa-one/api-server/.env api-server/.env
            echo ".env makinedeki kanonik kopyadan alindi."
          fi

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Canli stack bu makinede IKI compose projesi: 'api-server' (db+api, CI bunu
      # gunceller) ve kok 'prometa-one' (frontend/ml â€” elle yonetilir, DOKUNMA:
      # kokten 'up' ayni container_name'lerle isim cakismasi + cekilemeyen
      # bitnami/kafka imaji yuzunden bu makinede calismaz). Gizli degerler
      # (api-server/.env) repo'da yok; makinedeki kanonik kopyadan alinir â€”
      # yoksa GUVENLE DURUR (varsayilan JWT/DB secret'lariyla api'yi yeniden
      # yaratmak oturumlari ve sifreli veriyi bozar).
      - name: Deploy (docker compose up â€” api-server projesi)
        run: |
          if [ ! -f api-server/.env ]; then
            if [ -f /c/prometa-one/api-server/.env ]; then
              cp /c/prometa-one/api-server/.env api-server/.env
              echo ".env makinedeki kanonik kopyadan alindi."
            else
              echo "HATA: api-server/.env bulunamadi (repo'da gizli; makine kopyasi da yok). Deploy durduruldu." >&2
              exit 1
            fi
          fi
          docker compose -p api-server -f api-server/docker-compose.yml up -d --build postgres api

      - name: Migrate DB
        run: |
          # api saglikli olana kadar bekle, sonra migration'lari calistir (idempotent)
          for i in $(seq 1 30); do
            if docker compose -p api-server -f api-server/docker-compose.yml exec -T api curl -fsS http://localhost:3000/v1/health >/dev/null 2>&1; then
              echo "API hazir."
              break
            fi
            echo "API bekleniyor ($i/30)..."
            sleep 2
          done
          docker compose -p api-server -f api-server/docker-compose.yml exec -T api npm run migrate

      # Ĺžantiye mikroservisi (construction-service) â€” aynÄ± api-server projesi/aÄźÄ±.
      # CI eskiden yalnÄ±z db+api rebuild ediyordu; construction elle deploy
      # ediliyordu (kalÄ±cÄ± boĹźluk). ArtÄ±k burada otomatik build+deploy edilir.
      - name: Deploy construction-service (Ĺźantiye mikroservis)
        run: |
          # 1) prometa_construction DB'si yoksa oluĹźtur (postgres yalnÄ±z POSTGRES_DB'yi oto-yaratÄ±r)
          # NOT: 'psql -U prometa' varsayilan olarak role adiyla ayni ('prometa') DB'ye
          # baglanir â€” o DB YOK (asil DB 'prometa_one'), dolayisiyla kontrol her seferinde
          # patlar ve DB zaten varken createdb 'already exists' ile exit 1 verir. Cozum:
          # her zaman var olan bakim veritabanina baglan (-d postgres). createdb'yi de
          # idempotent yap (yarista/mevcutken adimi patlatma).
          if ! docker compose -p api-server -f api-server/docker-compose.yml exec -T postgres \
                 psql -U prometa -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='prometa_construction'" | grep -q 1; then
            echo "prometa_construction DB olusturuluyor..."
            docker compose -p api-server -f api-server/docker-compose.yml exec -T postgres createdb -U prometa prometa_construction || true
          fi
          # 2) Compose-dÄ±ĹźÄ± (elle docker run ile baĹźlatÄ±lmÄ±Ĺź) prometa-construction varsa,
          #    compose'un adopt edebilmesi iĂ§in kaldÄ±r (yalnÄ±z ilk geĂ§iĹźte tetiklenir;
          #    compose-managed olduktan sonra proje etiketi 'api-server' olur â†’ no-op).
          # NOT: filtre '^/ad$' YAZMA â€” Git Bash (MSYS) '=^/...' argĂĽmanÄ±ndaki '/'Ä± Windows
          # yoluna Ă§evirir, filtre hiĂ§ eĹźleĹźmez, rm atlanÄ±r ve compose up 'isim zaten
          # kullanÄ±mda' ile patlar. Docker ad filtresi slash'sÄ±z '^ad$' ile de tam eĹźleĹźir.
          CS_PROJ=$(docker inspect prometa-construction --format '{{index .Config.Labels "com.docker.compose.project"}}' 2>/dev/null || echo "")
          if [ -n "$(docker ps -aq -f name=^prometa-construction$)" ] && [ "$CS_PROJ" != "api-server" ]; then
            echo "prometa-construction compose-disi (proje='$CS_PROJ') -> adopt icin kaldiriliyor"
            docker rm -f prometa-construction || true
          fi
          # 3) Build + up. Container CMD'i migrate'i kendisi Ă§alÄ±ĹźtÄ±rÄ±r (node scripts/migrate.js && tsx).
          docker compose -p api-server -f api-server/docker-compose.yml up -d --build construction-service
          # 4) SaÄźlÄ±k kontrolĂĽ
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3002/v1/health >/dev/null 2>&1; then
              echo "construction-service hazir."
              break
            fi
            echo "construction-service bekleniyor ($i/30)..."
            sleep 2
          done

      - name: Servis durumu
        run: docker compose -p api-server -f api-server/docker-compose.yml ps

      # NOT: step-duzeyi 'shell: bash' YAZMA â€” job varsayilanini (Git Bash kisa
      # yolu) ezip WSL bash'e dusurur ve adim exit 1 ile patlar.
      - name: Ä°Ĺźlem logu yaz
        if: always()
        run: |
          mkdir -p deploy
          echo "$(date '+%Y-%m-%d %H:%M:%S') | commit=${GITHUB_SHA::8} | branch=${GITHUB_REF_NAME} | sonuc=${{ job.status }}" >> deploy/deploy-history.log
          echo "Son deploy kaydÄ±:"
          tail -n 1 deploy/deploy-history.log
