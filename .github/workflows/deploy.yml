name: Deploy (self-hosted · local Docker)

# Otomatik deploy: master/main'e push olunca PC'ndeki self-hosted runner
# build + test yapar, ardından docker-compose ile servisleri ayağa kaldırır.
# Manuel tetikleme için Actions sekmesinden "Run workflow" da kullanılabilir.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-local
  cancel-in-progress: true

jobs:
  build-test-deploy:
    name: Build · Test · Deploy
    runs-on: [self-hosted]

    # Windows self-hosted runner'da varsayilan shell 'pwsh'tir; bu makinede pwsh
    # kurulu degil (yalniz Windows PowerShell + bash var). Tum run adimlarini
    # Git bash ile calistir — aksi halde lint/typecheck/test "pwsh not found"
    # ile aninda patlar.
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Deploy (docker compose up)
        run: docker compose up -d --build

      - name: Migrate DB
        run: |
          # api saglikli olana kadar bekle, sonra migration'lari calistir (idempotent)
          for i in $(seq 1 30); do
            if docker compose exec -T api curl -fsS http://localhost:3000/v1/health >/dev/null 2>&1; then
              echo "API hazir."
              break
            fi
            echo "API bekleniyor ($i/30)..."
            sleep 2
          done
          docker compose exec -T api npm run migrate

      - name: Servis durumu
        run: docker compose ps

      - name: İşlem logu yaz
        if: always()
        shell: bash
        run: |
          mkdir -p deploy
          echo "$(date '+%Y-%m-%d %H:%M:%S') | commit=${GITHUB_SHA::8} | branch=${GITHUB_REF_NAME} | sonuc=${{ job.status }}" >> deploy/deploy-history.log
          echo "Son deploy kaydı:"
          tail -n 1 deploy/deploy-history.log
