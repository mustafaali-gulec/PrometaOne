name: Deploy (self-hosted · local Docker)

# Otomatik deploy: master/main'e push olunca PC'ndeki self-hosted runner
# build + test yapar, ardından docker-compose ile servisleri ayağa kaldırır.
# Manuel tetikleme için Actions sekmesinden "Run workflow" da kullanılabilir.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-local
  cancel-in-progress: true

jobs:
  build-test-deploy:
    name: Build · Test · Deploy
    runs-on: [self-hosted]

    # Bu makinede `shell: bash`, PATH'te System32'deki WSL launcher'ina
    # (C:\Windows\System32\bash.exe) cozuluyordu — WSL icinde Windows'a kurulu
    # node/npm YOK, dolayisiyla "Install dependencies" (npm ci) ~2 sn'de exit 1
    # ile patliyordu. Cozum: kabugu ACIK sekilde Git Bash'e sabitle (node/npm
    # Windows PATH'ini miras alir). Yol bu self-hosted makinede sabit.
    # NOT: Runner custom-shell dizesini bosluktan bolup ilk parcayi exe sayar ve
    # tirnakli yolu ONURLANDIRMAZ ("C:\Program... hatasi verir). Bu yuzden bosluksuz
    # 8.3 kisa yol kullaniyoruz (C:\PROGRA~1 = C:\Program Files).
    defaults:
      run:
        shell: 'C:\PROGRA~1\Git\bin\bash.exe --noprofile --norc -eo pipefail "{0}"'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Canli stack bu makinede IKI compose projesi: 'api-server' (db+api, CI bunu
      # gunceller) ve kok 'prometa-one' (frontend/ml — elle yonetilir, DOKUNMA:
      # kokten 'up' ayni container_name'lerle isim cakismasi + cekilemeyen
      # bitnami/kafka imaji yuzunden bu makinede calismaz). Gizli degerler
      # (api-server/.env) repo'da yok; makinedeki kanonik kopyadan alinir —
      # yoksa GUVENLE DURUR (varsayilan JWT/DB secret'lariyla api'yi yeniden
      # yaratmak oturumlari ve sifreli veriyi bozar).
      - name: Deploy (docker compose up — api-server projesi)
        run: |
          if [ ! -f api-server/.env ]; then
            if [ -f /c/prometa-one/api-server/.env ]; then
              cp /c/prometa-one/api-server/.env api-server/.env
              echo ".env makinedeki kanonik kopyadan alindi."
            else
              echo "HATA: api-server/.env bulunamadi (repo'da gizli; makine kopyasi da yok). Deploy durduruldu." >&2
              exit 1
            fi
          fi
          docker compose -p api-server -f api-server/docker-compose.yml up -d --build postgres api

      - name: Migrate DB
        run: |
          # api saglikli olana kadar bekle, sonra migration'lari calistir (idempotent)
          for i in $(seq 1 30); do
            if docker compose -p api-server -f api-server/docker-compose.yml exec -T api curl -fsS http://localhost:3000/v1/health >/dev/null 2>&1; then
              echo "API hazir."
              break
            fi
            echo "API bekleniyor ($i/30)..."
            sleep 2
          done
          docker compose -p api-server -f api-server/docker-compose.yml exec -T api npm run migrate

      # Şantiye mikroservisi (construction-service) — aynı api-server projesi/ağı.
      # CI eskiden yalnız db+api rebuild ediyordu; construction elle deploy
      # ediliyordu (kalıcı boşluk). Artık burada otomatik build+deploy edilir.
      - name: Deploy construction-service (şantiye mikroservis)
        run: |
          # 1) prometa_construction DB'si yoksa oluştur (postgres yalnız POSTGRES_DB'yi oto-yaratır)
          if ! docker compose -p api-server -f api-server/docker-compose.yml exec -T postgres \
                 psql -U prometa -tAc "SELECT 1 FROM pg_database WHERE datname='prometa_construction'" | grep -q 1; then
            echo "prometa_construction DB olusturuluyor..."
            docker compose -p api-server -f api-server/docker-compose.yml exec -T postgres createdb -U prometa prometa_construction
          fi
          # 2) Compose-dışı (elle docker run ile başlatılmış) prometa-construction varsa,
          #    compose'un adopt edebilmesi için kaldır (yalnız ilk geçişte tetiklenir;
          #    compose-managed olduktan sonra proje etiketi 'api-server' olur → no-op).
          CS_PROJ=$(docker inspect prometa-construction --format '{{index .Config.Labels "com.docker.compose.project"}}' 2>/dev/null || echo "")
          if [ -n "$(docker ps -aq -f name=^/prometa-construction$)" ] && [ "$CS_PROJ" != "api-server" ]; then
            echo "prometa-construction compose-disi (proje='$CS_PROJ') -> adopt icin kaldiriliyor"
            docker rm -f prometa-construction || true
          fi
          # 3) Build + up. Container CMD'i migrate'i kendisi çalıştırır (node scripts/migrate.js && tsx).
          docker compose -p api-server -f api-server/docker-compose.yml up -d --build construction-service
          # 4) Sağlık kontrolü
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3002/v1/health >/dev/null 2>&1; then
              echo "construction-service hazir."
              break
            fi
            echo "construction-service bekleniyor ($i/30)..."
            sleep 2
          done

      - name: Servis durumu
        run: docker compose -p api-server -f api-server/docker-compose.yml ps

      # NOT: step-duzeyi 'shell: bash' YAZMA — job varsayilanini (Git Bash kisa
      # yolu) ezip WSL bash'e dusurur ve adim exit 1 ile patlar.
      - name: İşlem logu yaz
        if: always()
        run: |
          mkdir -p deploy
          echo "$(date '+%Y-%m-%d %H:%M:%S') | commit=${GITHUB_SHA::8} | branch=${GITHUB_REF_NAME} | sonuc=${{ job.status }}" >> deploy/deploy-history.log
          echo "Son deploy kaydı:"
          tail -n 1 deploy/deploy-history.log
