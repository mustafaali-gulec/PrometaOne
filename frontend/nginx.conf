# =============================================================================
# PROMETA ONE — Uretim nginx yapilandirmasi (web container'i)
#
# Gorevler:
#   - Vite build ciktisini (SPA) sunmak — bilinmeyen yollar index.html'e duser
#   - /v1/construction/* -> construction-service:3002 (OPSIYONEL profil; dinamik
#     upstream deseni: container yoksa nginx yine ayaga kalkar, istek 502 doner)
#   - /v1/*              -> api:3000 (zorunlu servis; statik proxy_pass)
#   - /api/ml/*          -> ml-service:8001 (path rewrite: /api/ml/x -> /x;
#     ml-service rotalari kokte: /health, /models, /predict/..., /v1/feedback)
#
# Not: Bu dosya /etc/nginx/conf.d/default.conf olarak kopyalanir (http baglami).
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Excel import / e-Fatura HTML-PDF yukleme gibi buyuk istek govdeleri
    client_max_body_size 64m;

    # --- gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # Docker'in gomulu DNS'i — opsiyonel (profil bazli) servislerin adini
    # istek aninda cozmek icin. valid=10s: container sonradan acilirsa
    # nginx restart'i gerekmeden upstream bulunur.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # --- Santiye mikroservisi (OPSIYONEL — 'construction' profili) ---
    # Degisken uzerinden proxy_pass: nginx acilista DNS cozmez; construction
    # container'i yoksa web yine calisir, sadece bu istekler 502 doner.
    # (Degiskenli proxy_pass URI'yi OLDUGU GIBI iletir — path degismez.)
    location /v1/construction/ {
        set $construction_upstream http://construction-service:3002;
        proxy_pass $construction_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- Backend API (zorunlu servis) ---
    location /v1/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Rapor uretimi / Excel export gibi uzun istekler icin genis pay
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # --- ML servisi ---
    # proxy_pass sonundaki '/' location onekini siler: /api/ml/health -> /health
    location /api/ml/ {
        proxy_pass http://ml-service:8001/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Model egitimi (train/*) uzun surebilir
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # --- Hash'li statik varliklar (vite: /assets/xxx.[hash].js) — uzun cache ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html asla cache'lenmesin (yeni surumler aninda gorunsun)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
